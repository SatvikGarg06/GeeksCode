<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Editor</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="node_modules/xterm/css/xterm.css" />
  <link rel="stylesheet" href="node_modules/monaco-editor/min/vs/editor/editor.main.css" />
</head>

<body>
  <!-- Title Bar (macOS style) -->
  <div id="titlebar">
    <div class="titlebar-drag"></div>
    <span class="titlebar-title">Code Editor</span>
  </div>

  <div id="main-container">
    <!-- Activity Bar -->
    <div id="activity-bar">
      <div class="activity-icon active" data-panel="explorer" title="Explorer">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path
            d="M3 7V17C3 18.1 3.9 19 5 19H19C20.1 19 21 18.1 21 17V9C21 7.9 20.1 7 19 7H11L9 5H5C3.9 5 3 5.9 3 7Z" />
        </svg>
      </div>
      <div class="activity-icon" data-panel="search" title="Search">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="7" />
          <path d="M16 16L21 21" />
        </svg>
      </div>
      <div class="activity-icon" data-panel="git" title="Source Control">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="6" r="2.5" />
          <circle cx="12" cy="18" r="2.5" />
          <circle cx="18" cy="12" r="2.5" />
          <path d="M12 8.5V15.5" />
          <path d="M14.5 12H15.5" />
        </svg>
      </div>
      <div class="activity-icon" data-panel="extensions" title="Extensions">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="8" height="8" rx="1" />
          <rect x="13" y="3" width="8" height="8" rx="1" />
          <rect x="3" y="13" width="8" height="8" rx="1" />
          <rect x="13" y="13" width="8" height="8" rx="1" />
        </svg>
      </div>
      <div class="activity-spacer"></div>
      <button id="theme-toggle" class="theme-toggle" title="Toggle Theme">
        <!-- Moon icon (visible in dark mode) -->
        <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
        <!-- Sun icon (visible in light mode) -->
        <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
      </button>
    </div>

    <!-- Sidebar -->
    <div id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">EXPLORER</span>
      </div>
      <div id="folder-header" style="display:none;">
        <span id="folder-name" class="folder-name"></span>
      </div>
      <div id="file-tree"></div>
      <div id="open-folder-prompt">
        <p>No folder opened</p>
        <button id="btn-open-folder" class="btn-primary">Open Folder</button>
      </div>
    </div>

    <!-- Sidebar Resize Handle -->
    <div id="sidebar-resize"></div>

    <!-- Editor + Panel Area -->
    <div id="editor-panel-area">
      <!-- Editor Area -->
      <div id="editor-area">
        <!-- Tabs -->
        <div id="tabs-bar">
          <div id="tabs-container"></div>
        </div>
        <!-- Welcome or Editor -->
        <div id="welcome-view">
          <div class="welcome-content">
            <h1>Code Editor</h1>
            <p class="welcome-subtitle">Start by opening a folder</p>
            <div class="welcome-actions">
              <button id="btn-welcome-open" class="btn-primary">Open Folder</button>
            </div>
            <div class="welcome-shortcuts">
              <div class="shortcut-item"><kbd class="mod-key">⌘</kbd> + <kbd>S</kbd> <span>Save File</span></div>
              <div class="shortcut-item"><kbd>Ctrl</kbd> + <kbd>`</kbd> <span>Toggle Terminal</span></div>
            </div>
          </div>
        </div>
        <div id="monaco-container"></div>
      </div>

      <!-- Panel Resize Handle -->
      <div id="panel-resize" style="display:none;"></div>

      <!-- Terminal Panel -->
      <div id="panel" style="display:none;">
        <div class="panel-header">
          <div class="panel-tabs">
            <span class="panel-tab active">TERMINAL</span>
          </div>
          <div class="panel-actions">
            <button id="btn-panel-close" class="icon-btn" title="Close Panel">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M1 1L13 13M13 1L1 13" />
              </svg>
            </button>
          </div>
        </div>
        <div id="terminal-container"></div>
      </div>
    </div>
  </div>

  <!-- Status Bar -->
  <div id="status-bar">
    <div class="status-left">
      <span class="status-item" id="status-branch">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="6" r="2.5" />
          <circle cx="12" cy="18" r="2.5" />
          <path d="M12 8.5V15.5" />
        </svg>
        main
      </span>
    </div>
    <div class="status-right">
      <span class="status-item" id="status-position">Ln 1, Col 1</span>
      <span class="status-item" id="status-encoding">UTF-8</span>
      <span class="status-item" id="status-language">Plain Text</span>
    </div>
  </div>

  <script>
    // Platform detection & UI adaptation
    (function () {
      const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
      // Set modifier key labels
      const modKey = isMac ? '⌘' : 'Ctrl';
      document.querySelectorAll('.mod-key').forEach(el => el.textContent = modKey);
      // Hide custom titlebar on non-macOS (native title bar is used)
      if (!isMac) {
        const titlebar = document.getElementById('titlebar');
        if (titlebar) titlebar.style.display = 'none';
        document.documentElement.style.setProperty('--titlebar-height', '0px');
      }
    })();

    // Monaco loader
    var require = { paths: { vs: './node_modules/monaco-editor/min/vs' } };
  </script>
  <!-- Load xterm BEFORE Monaco's AMD loader so the UMD falls through to globals -->
  <script src="node_modules/xterm/lib/xterm.js"></script>
  <script src="node_modules/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
  <script src="node_modules/monaco-editor/min/vs/loader.js"></script>
  <script src="renderer.js"></script>
</body>

</html>
